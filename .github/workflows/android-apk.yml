name: Build Home Care Android APK

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'android/**'
      - '.github/workflows/android-apk.yml'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10.2'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Build debug APK
        run: gradle -p android :app:assembleDebug

      - name: Copy APK to public download path
        run: |
          mkdir -p public
          cp android/app/build/outputs/apk/debug/app-debug.apk public/home-care.apk

      - name: Commit APK for Render download
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/home-care.apk
          git commit -m "Update downloadable Home Care Android APK" || echo "No APK changes to commit"
          git push

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: home-care-android-debug-apk
          path: public/home-care.apk
