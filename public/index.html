<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#06243a" />
  <link rel="manifest" href="/manifest.json" />
  <title>Home Care PWA</title>
  <style>
    :root { --navy:#06243a; --blue:#0f3a5a; --teal:#0f8b8d; --gold:#c7952d; --green:#2f7d46; --red:#b42318; --bg:#f5f1e8; --card:#fffdf7; --muted:#617083; }
    *{box-sizing:border-box} body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:var(--bg);color:#0a2540} a{color:inherit}
    .top{background:linear-gradient(120deg,var(--navy),#0b466b);color:white;padding:18px 20px;display:flex;gap:14px;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:5;box-shadow:0 6px 24px rgba(0,0,0,.15)}
    .brand{font-weight:800;font-size:22px;letter-spacing:.2px}.brand span{color:var(--gold)}.user{font-size:13px;color:#d9e7f2}.wrap{max-width:1220px;margin:0 auto;padding:18px}
    .login{max-width:430px;margin:8vh auto;background:white;border-radius:24px;padding:30px;box-shadow:0 20px 60px rgba(6,36,58,.18)}.login h1{margin:0 0 6px;font-size:32px}.login p{color:var(--muted);margin:0 0 20px}
    input,select,textarea,button{font:inherit} input,select,textarea{width:100%;border:1px solid #d9d3c8;border-radius:12px;padding:12px;background:#fff;color:#0a2540} textarea{min-height:88px;resize:vertical}.row{display:grid;grid-template-columns:repeat(12,1fr);gap:14px}.col-3{grid-column:span 3}.col-4{grid-column:span 4}.col-6{grid-column:span 6}.col-8{grid-column:span 8}.col-12{grid-column:span 12}
    label{font-weight:700;font-size:13px;margin-bottom:6px;display:block;color:#123}.btn{border:0;border-radius:12px;padding:12px 16px;background:var(--navy);color:white;font-weight:800;cursor:pointer;display:inline-flex;gap:8px;align-items:center;justify-content:center}.btn:hover{filter:brightness(1.08)}.btn.gold{background:var(--gold);color:#071d30}.btn.teal{background:var(--teal)}.btn.green{background:var(--green)}.btn.red{background:var(--red)}.btn.light{background:#e9f2f4;color:#0a2540}.btn.small{padding:8px 10px;border-radius:10px;font-size:13px}
    .tabs{display:flex;gap:8px;overflow:auto;padding:12px 0}.tab{white-space:nowrap;border:1px solid #d8d0c5;background:white;color:#0a2540;border-radius:999px;padding:10px 14px;cursor:pointer;font-weight:800}.tab.active{background:var(--navy);color:white;border-color:var(--navy)}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px}.card{background:var(--card);border:1px solid #e2d7c8;border-radius:22px;padding:18px;box-shadow:0 10px 25px rgba(6,36,58,.08)}.card h2,.card h3{margin:0 0 12px}.muted{color:var(--muted)}.stat{font-size:36px;font-weight:900;color:var(--navy)}
    table{width:100%;border-collapse:collapse;background:white;border-radius:16px;overflow:hidden} th,td{padding:11px;border-bottom:1px solid #eee;text-align:left;vertical-align:top;font-size:14px} th{background:#f4efe6;font-size:12px;text-transform:uppercase;color:#4b5563}.badge{display:inline-flex;padding:5px 9px;border-radius:999px;font-size:12px;font-weight:900;background:#e9eef5;color:#0a2540}.badge.ok{background:#e4f6eb;color:#176b35}.badge.bad{background:#fee4e2;color:#9a1d13}.badge.warn{background:#fff4d6;color:#8a5d00}.pkg{font-weight:900}.pkg.base{color:#082b4d}.pkg.comfort{color:#087b7b}.pkg.premium{color:#b01780}.pkg.villa_giardino{color:#2f7d46}.pkg.localita_limitrofe{color:#5b3d96}
    .section{display:none}.section.active{display:block}.toolbar{display:flex;gap:10px;align-items:center;justify-content:space-between;flex-wrap:wrap;margin:10px 0 14px}.notice{border-left:5px solid var(--gold);background:#fff8e8;padding:12px;border-radius:12px;margin:12px 0}.error{border-left-color:var(--red);background:#fff1f0}.success{border-left-color:var(--green);background:#ecfdf3}.photos{display:flex;gap:8px;flex-wrap:wrap}.photos img{width:90px;height:70px;object-fit:cover;border-radius:10px;border:1px solid #ddd}.hidden{display:none!important}.footer{padding:20px;color:var(--muted);text-align:center}
    @media(max-width:800px){.col-3,.col-4,.col-6,.col-8{grid-column:span 12}.top{align-items:flex-start;flex-direction:column}.wrap{padding:12px} th,td{font-size:12px}.stat{font-size:30px}}
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    const state = { token: localStorage.getItem('hc_token'), user: null, config: null, tab: 'dashboard', customers: [], properties: [] };
    const pkgLabel = {base:'Base', comfort:'Comfort', premium:'Premium', villa_giardino:'Villa & Giardino', localita_limitrofe:'Località Limitrofe'};
    const euro = cents => new Intl.NumberFormat('it-IT',{style:'currency',currency:'EUR'}).format((Number(cents)||0)/100);
    const qs = s => document.querySelector(s);
    const app = qs('#app');

    async function api(path, options={}) {
      const headers = options.body instanceof FormData ? {} : {'Content-Type':'application/json'};
      if (state.token) headers.Authorization = 'Bearer ' + state.token;
      const res = await fetch(path, {...options, headers:{...headers, ...(options.headers||{})}});
      const type = res.headers.get('content-type') || '';
      const data = type.includes('application/json') ? await res.json() : await res.text();
      if (!res.ok) throw new Error(data.error || data || 'Errore richiesta');
      return data;
    }
    function msg(text, kind='notice'){ return `<div class="notice ${kind}">${text}</div>`; }
    function logout(){ localStorage.removeItem('hc_token'); location.reload(); }
    function header(){ return `<div class="top"><div class="brand">⌂ Home <span>Care</span></div><div class="user">${state.user?.name||''} · ${state.user?.role==='admin'?'Admin':'Cliente'} <button class="btn small light" onclick="logout()">Esci</button></div></div>`; }

    async function boot(){
      try { state.config = await api('/api/config', {headers:{}}); } catch(e){}
      if (!state.token) return renderLogin();
      try { const me = await api('/api/auth/me'); state.user = me.user; renderShell(); }
      catch(e){ localStorage.removeItem('hc_token'); renderLogin(e.message); }
    }
    function renderLogin(error=''){
      app.innerHTML = `<div class="login"><h1>Home Care</h1><p>Accedi al gestionale.</p>${error?msg(error,'error'):''}<form id="loginForm"><label>Email</label><input name="email" type="email" required autocomplete="username"><br><br><label>Password</label><input name="password" type="password" required autocomplete="current-password"><br><br><button class="btn" style="width:100%">Accedi</button></form></div>`;
      qs('#loginForm').onsubmit = async (ev)=>{ ev.preventDefault(); const fd = Object.fromEntries(new FormData(ev.target)); try{ const r=await api('/api/auth/login',{method:'POST',body:JSON.stringify(fd)}); localStorage.setItem('hc_token',r.token); state.token=r.token; state.user=r.user; renderShell(); }catch(e){renderLogin(e.message)} };
    }
    function renderShell(){ app.innerHTML = header()+`<div class="wrap" id="content"></div><div class="footer">Home Care PWA</div>`; state.user.role==='admin'?renderAdmin():renderClient(); }
    function nav(tabs){ return `<div class="tabs">${tabs.map(t=>`<button class="tab ${state.tab===t.id?'active':''}" onclick="state.tab='${t.id}'; renderAdmin()">${t.label}</button>`).join('')}</div>`; }

    async function renderAdmin(){
      const tabs=[{id:'dashboard',label:'Dashboard'},{id:'customers',label:'Clienti'},{id:'properties',label:'Immobili/GPS'},{id:'checks',label:'Controlli'},{id:'tasks',label:'Cose da fare'},{id:'payments',label:'Pagamenti'},{id:'route',label:'Giro'}];
      qs('#content').innerHTML = nav(tabs)+`<div id="panel">Caricamento...</div>`;
      try { await loadBaseLists(); } catch(e){}
      if(state.tab==='dashboard') return dashboard();
      if(state.tab==='customers') return customersView();
      if(state.tab==='properties') return propertiesView();
      if(state.tab==='checks') return checksView();
      if(state.tab==='tasks') return tasksView();
      if(state.tab==='payments') return paymentsView();
      if(state.tab==='route') return routeView();
    }
    async function loadBaseLists(){
      const [c,p] = await Promise.all([api('/api/admin/customers'), api('/api/admin/properties')]);
      state.customers=c.customers; state.properties=p.properties;
    }
    function customerOptions(){ return state.customers.map(c=>`<option value="${c.id}">${esc(c.name)}${c.payment_valid?'':' · pagamento non regolare'}</option>`).join(''); }
    function esc(s=''){ return String(s).replace(/[&<>"]/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m])); }

    async function dashboard(){
      const s = await api('/api/admin/summary');
      qs('#panel').innerHTML = `<div class="grid"><div class="card"><div class="muted">Clienti</div><div class="stat">${s.customers}</div></div><div class="card"><div class="muted">Immobili attivi</div><div class="stat">${s.properties}</div></div><div class="card"><div class="muted">Controlli da fare</div><div class="stat">${s.dueChecks}</div></div><div class="card"><div class="muted">Bloccati pagamento</div><div class="stat">${s.blockedChecks}</div></div><div class="card"><div class="muted">Cose da fare</div><div class="stat">${s.todoTasks}</div></div><div class="card"><div class="muted">Extra da incassare</div><div class="stat">${s.pendingExtraPayments}</div></div></div>${msg('Un controllo è eseguibile solo se il cliente è in regola con Stripe o con pagamento manuale registrato.','success')}`;
    }

    async function customersView(){
      qs('#panel').innerHTML = `<div class="row"><div class="col-4"><div class="card"><h3>Nuovo cliente</h3><form id="customerForm"><label>Nome</label><input name="name" required><label>Email</label><input name="email" type="email"><label>Telefono</label><input name="phone"><label>Note</label><textarea name="notes"></textarea><button class="btn">Salva cliente</button></form></div><div class="card"><h3>Pagamento manuale / annuale</h3><form id="manualPayForm"><label>Cliente</label><select name="customer_id" required>${customerOptions()}</select><label>Importo incassato</label><input name="amount_euro" placeholder="es. 468"><label>Pagato fino al</label><input name="paid_until" type="date" required><label>Metodo</label><select name="method"><option>contanti</option><option>bonifico</option><option>assegno</option><option>altro</option></select><label>Note</label><input name="description" value="Pagamento anticipato registrato manualmente"><button class="btn green">Segna come pagato</button></form></div></div><div class="col-8"><div class="card"><h3>Clienti</h3><div id="customersTable"></div></div></div></div>`;
      renderCustomersTable();
      qs('#customerForm').onsubmit=async ev=>{ev.preventDefault();try{await api('/api/admin/customers',{method:'POST',body:JSON.stringify(Object.fromEntries(new FormData(ev.target)))}); state.tab='customers'; renderAdmin();}catch(e){alert(e.message)}};
      qs('#manualPayForm').onsubmit=async ev=>{ev.preventDefault();const fd=Object.fromEntries(new FormData(ev.target));try{await api(`/api/admin/customers/${fd.customer_id}/manual-payment`,{method:'POST',body:JSON.stringify(fd)}); alert('Pagamento registrato.'); state.tab='customers'; renderAdmin();}catch(e){alert(e.message)}};
    }
    function renderCustomersTable(){
      qs('#customersTable').innerHTML = `<table><thead><tr><th>Cliente</th><th>Contatto</th><th>Pagamento</th><th>Immobili</th><th>Azioni</th></tr></thead><tbody>${state.customers.map(c=>`<tr><td><b>${esc(c.name)}</b><br><span class="muted">${esc(c.notes||'')}</span></td><td>${esc(c.email||'')}<br>${esc(c.phone||'')}</td><td><span class="badge ${c.payment_valid?'ok':'bad'}">${c.payment_valid?'regolare':'non regolare'}</span><br>${c.paid_until?`fino al ${c.paid_until}`:''}</td><td>${c.properties_count}</td><td><button class="btn small light" onclick="createClientLogin('${c.id}')">Crea login cliente</button></td></tr>`).join('')}</tbody></table>`;
    }
    async function createClientLogin(id){ const pass=prompt('Password cliente, lascia vuoto per generarla automaticamente'); if(pass===null)return; try{const r=await api(`/api/admin/customers/${id}/client-login`,{method:'POST',body:JSON.stringify({password:pass||undefined})}); alert('Login cliente pronto. Password: '+r.temporaryPassword);}catch(e){alert(e.message)} }

    async function propertiesView(){
      qs('#panel').innerHTML = `<div class="row"><div class="col-4"><div class="card"><h3>Nuovo immobile</h3><form id="propertyForm"><label>Cliente</label><select name="customer_id" required>${customerOptions()}</select><label>Nome immobile</label><input name="name" required placeholder="Casa mare, Villa, Appartamento"><label>Indirizzo</label><input name="address"><label>Città</label><input name="city" value="Badesi"><label>Zona</label><input name="zone"><label>Servizio</label><select name="package_type"><option value="base">Base</option><option value="comfort">Comfort</option><option value="premium">Premium</option><option value="villa_giardino">Villa & Giardino</option><option value="localita_limitrofe">Località Limitrofe</option></select><div class="row"><div class="col-6"><label>Latitudine</label><input name="latitude" id="lat"></div><div class="col-6"><label>Longitudine</label><input name="longitude" id="lng"></div></div><button type="button" class="btn light" onclick="fillGps()">Usa GPS attuale</button> <button class="btn">Salva immobile</button></form></div></div><div class="col-8"><div class="card"><h3>Immobili</h3><div id="propertiesTable"></div></div></div></div>`;
      renderPropertiesTable();
      qs('#propertyForm').onsubmit=async ev=>{ev.preventDefault();try{await api('/api/admin/properties',{method:'POST',body:JSON.stringify(Object.fromEntries(new FormData(ev.target)))});state.tab='properties';renderAdmin();}catch(e){alert(e.message)}};
    }
    function renderPropertiesTable(){
      qs('#propertiesTable').innerHTML = `<table><thead><tr><th>Immobile</th><th>Cliente</th><th>Servizio</th><th>GPS</th><th>Prossimo controllo</th><th>Azioni</th></tr></thead><tbody>${state.properties.map(p=>`<tr><td><b>${esc(p.name)}</b><br>${esc(p.address||'')} ${esc(p.city||'')}</td><td>${esc(p.customer_name)}<br><span class="badge ${p.payment_valid?'ok':'bad'}">${p.payment_valid?'pagato':'sospeso'}</span></td><td><span class="pkg ${p.package_type}">${pkgLabel[p.package_type]||p.package_type}</span><br>${euro(p.monthly_price_cents)}</td><td>${p.latitude&&p.longitude?`📍 ${p.latitude}, ${p.longitude}<br><a target="_blank" href="https://www.google.com/maps?q=${p.latitude},${p.longitude}">Apri Maps</a>`:'Non salvato'}</td><td>${p.next_check_date}</td><td><button class="btn small teal" onclick="saveGpsToProperty('${p.id}')">Salva GPS ora</button></td></tr>`).join('')}</tbody></table>`;
    }
    function fillGps(){ navigator.geolocation.getCurrentPosition(pos=>{qs('#lat').value=pos.coords.latitude.toFixed(7); qs('#lng').value=pos.coords.longitude.toFixed(7);}, err=>alert('GPS non disponibile: '+err.message), {enableHighAccuracy:true}); }
    async function saveGpsToProperty(id){ navigator.geolocation.getCurrentPosition(async pos=>{try{await api(`/api/admin/properties/${id}/location`,{method:'POST',body:JSON.stringify({latitude:pos.coords.latitude,longitude:pos.coords.longitude})}); alert('Posizione salvata.'); renderAdmin();}catch(e){alert(e.message)}}, err=>alert('GPS non disponibile: '+err.message), {enableHighAccuracy:true}); }

    async function checksView(){
      const r = await api('/api/admin/due-checks');
      qs('#panel').innerHTML = `<div class="card"><h3>Controlli da fare</h3><div id="completeBox"></div><table><thead><tr><th>Immobile</th><th>Cliente</th><th>Servizio</th><th>Stato</th><th>Azioni</th></tr></thead><tbody>${r.checks.map(p=>`<tr><td><b>${esc(p.name)}</b><br>${esc(p.address||'')}</td><td>${esc(p.customer_name)}<br>${esc(p.customer_phone||'')}</td><td><span class="pkg ${p.package_type}">${pkgLabel[p.package_type]||p.package_type}</span></td><td>${p.blocked?'<span class="badge bad">pagamento non regolare</span>':'<span class="badge ok">eseguibile</span>'}</td><td>${p.blocked?'Controllo sospeso':`<button class="btn small green" onclick="showComplete('${p.id}','${p.package_type}')">Completa</button>`}</td></tr>`).join('')}</tbody></table></div>`;
    }
    function showComplete(propertyId, packageType){
      const checklist = state.config?.checklists?.[packageType] || [];
      qs('#completeBox').innerHTML = `<div class="notice"><h3>Completa controllo</h3><form id="completeForm"><input type="hidden" name="property_id" value="${propertyId}">${checklist.map((x,i)=>`<label><input type="checkbox" name="ck" value="${esc(x)}" checked style="width:auto"> ${esc(x)}</label>`).join('')}<label>Note</label><textarea name="notes"></textarea><label>Foto</label><input name="photos" type="file" multiple accept="image/*"><br><br><button class="btn green">Salva controllo</button></form></div>`;
      qs('#completeForm').onsubmit=async ev=>{ev.preventDefault(); const fd=new FormData(ev.target); const checklistValues=[...ev.target.querySelectorAll('input[name="ck"]:checked')].map(i=>i.value); fd.delete('ck'); fd.append('checklist_json', JSON.stringify(checklistValues)); try{await api('/api/admin/checks/complete',{method:'POST',body:fd}); alert('Controllo completato.'); renderAdmin();}catch(e){alert(e.message)} };
    }

    async function tasksView(){
      const r = await api('/api/admin/tasks');
      qs('#panel').innerHTML = `<div class="row"><div class="col-4"><div class="card"><h3>Nuova cosa da fare</h3><form id="taskForm"><label>Titolo</label><input name="title" required><label>Descrizione</label><textarea name="description"></textarea><label>Tipo</label><select name="type"><option>controllo</option><option>manutenzione</option><option>preventivo</option><option>pagamento</option><option>altro</option></select><label>Priorità</label><select name="priority"><option>normale</option><option>alta</option><option>bassa</option></select><label>Scadenza</label><input type="date" name="due_date"><button class="btn">Aggiungi</button></form></div></div><div class="col-8"><div class="card"><h3>Lista cose da fare</h3><table><thead><tr><th>Attività</th><th>Cliente/immobile</th><th>Scadenza</th><th></th></tr></thead><tbody>${r.tasks.map(t=>`<tr><td><b>${esc(t.title)}</b><br>${esc(t.description||'')}</td><td>${esc(t.customer_name||'')}<br>${esc(t.property_name||'')}</td><td>${t.due_date||''}</td><td><button class="btn small green" onclick="doneTask('${t.id}')">Fatto</button></td></tr>`).join('')}</tbody></table></div></div></div>`;
      qs('#taskForm').onsubmit=async ev=>{ev.preventDefault();try{await api('/api/admin/tasks',{method:'POST',body:JSON.stringify(Object.fromEntries(new FormData(ev.target)))});renderAdmin();}catch(e){alert(e.message)}};
    }
    async function doneTask(id){ try{await api(`/api/admin/tasks/${id}/done`,{method:'POST',body:'{}'}); renderAdmin();}catch(e){alert(e.message)} }

    async function paymentsView(){
      const [extras, manual] = await Promise.all([api('/api/admin/extra-payments'), api('/api/admin/manual-payments')]);
      qs('#panel').innerHTML = `<div class="row"><div class="col-4"><div class="card"><h3>Richiesta pagamento extra</h3><form id="extraForm"><label>Cliente</label><select name="customer_id" required>${customerOptions()}</select><label>Importo</label><input name="amount_euro" required placeholder="es. 185"><label>Descrizione</label><textarea name="description" required placeholder="Manutenzione, materiali, extra..."></textarea><button class="btn gold">Crea pagamento</button></form></div></div><div class="col-8"><div class="card"><h3>Extra / manutenzioni</h3><table><thead><tr><th>Cliente</th><th>Descrizione</th><th>Importo</th><th>Stato</th><th>Link</th></tr></thead><tbody>${extras.payments.map(p=>`<tr><td>${esc(p.customer_name)}</td><td>${esc(p.description)}</td><td>${euro(p.amount_cents)}</td><td><span class="badge ${p.status==='paid'?'ok':'warn'}">${p.status}</span></td><td>${p.payment_url?`<a target="_blank" href="${p.payment_url}">Apri link</a>`:'Stripe non configurato'}</td></tr>`).join('')}</tbody></table></div><div class="card"><h3>Pagamenti manuali recenti</h3><table><thead><tr><th>Cliente</th><th>Importo</th><th>Metodo</th><th>Pagato fino al</th></tr></thead><tbody>${manual.payments.map(p=>`<tr><td>${esc(p.customer_name)}</td><td>${p.amount_cents?euro(p.amount_cents):'-'}</td><td>${esc(p.method)}</td><td>${p.paid_until||''}</td></tr>`).join('')}</tbody></table></div></div></div>`;
      qs('#extraForm').onsubmit=async ev=>{ev.preventDefault();try{const r=await api('/api/admin/extra-payments',{method:'POST',body:JSON.stringify(Object.fromEntries(new FormData(ev.target)))}); alert(r.payment.payment_url?'Pagamento creato. Copia link al cliente.':'Pagamento salvato. Configura Stripe per creare link automatici.'); renderAdmin();}catch(e){alert(e.message)}};
    }

    async function routeView(){
      qs('#panel').innerHTML = `<div class="card"><h3>Organizza giro controlli</h3><p class="muted">Usa la tua posizione attuale per ordinare gli immobili da controllare per distanza.</p><button class="btn teal" onclick="loadRoute()">Calcola giro con GPS attuale</button><div id="routeResult"></div></div>`;
    }
    function loadRoute(){ navigator.geolocation.getCurrentPosition(async pos=>{try{const r=await api(`/api/admin/route-plan?lat=${pos.coords.latitude}&lng=${pos.coords.longitude}`); qs('#routeResult').innerHTML = `<br><h3>Totale stimato: ${r.totalKm} km</h3><table><thead><tr><th>#</th><th>Immobile</th><th>Cliente</th><th>Distanza</th><th>Maps</th></tr></thead><tbody>${r.properties.map((p,i)=>`<tr><td>${i+1}</td><td><b>${esc(p.name)}</b><br>${esc(p.address||'')}</td><td>${esc(p.customer_name)}</td><td>${p.distance_from_previous_km} km</td><td><a target="_blank" href="https://www.google.com/maps?q=${p.latitude},${p.longitude}">Apri</a></td></tr>`).join('')}</tbody></table>`;}catch(e){alert(e.message)}}, err=>alert('GPS non disponibile: '+err.message), {enableHighAccuracy:true}); }

    async function renderClient(){
      qs('#content').innerHTML = `<div id="clientPanel">Caricamento...</div>`;
      try{ const r=await api('/api/client/dashboard'); qs('#clientPanel').innerHTML = `<div class="grid"><div class="card"><h3>Il tuo stato</h3><span class="badge ${r.customer.payment_valid?'ok':'bad'}">${r.customer.payment_valid?'Pagamento regolare':'Pagamento non regolare'}</span>${r.customer.paid_until?`<p>Pagato fino al ${r.customer.paid_until}</p>`:''}</div>${r.properties.map(p=>`<div class="card"><h3>${esc(p.name)}</h3><p>${esc(p.address||'')}</p><p><span class="pkg ${p.package_type}">${pkgLabel[p.package_type]||p.package_type}</span></p><p>Prossimo controllo: ${p.next_check_date}</p></div>`).join('')}</div><div class="card"><h3>Report recenti</h3>${r.reports.map(rep=>`<div class="notice"><b>${esc(rep.property_name)}</b> · ${rep.completed_at||''}<p>${esc(rep.notes||'')}</p><div class="photos">${(rep.photo_urls||[]).map(u=>`<img src="${u}">`).join('')}</div></div>`).join('')||'<p>Nessun report disponibile.</p>'}</div><div class="card"><h3>Pagamenti extra</h3><table><thead><tr><th>Descrizione</th><th>Importo</th><th>Stato</th><th></th></tr></thead><tbody>${r.payments.map(p=>`<tr><td>${esc(p.description)}</td><td>${euro(p.amount_cents)}</td><td>${p.status}</td><td>${p.payment_url?`<a href="${p.payment_url}" target="_blank">Paga</a>`:''}</td></tr>`).join('')}</tbody></table></div>`;}catch(e){qs('#clientPanel').innerHTML=msg(e.message,'error')}
    }

    if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(()=>{});
    boot();
  </script>
</body>
</html>
