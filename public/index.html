<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#082a3e">
  <meta name="color-scheme" content="light">
  <meta name="application-name" content="Home Care">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Home Care">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="description" content="Area clienti e gestionale Home Care per immobili, controlli, report, contatti e pagamenti.">
  <link rel="manifest" href="/manifest.json?v=40">
  <link rel="icon" type="image/svg+xml" href="/icon.svg?v=40">
  <link rel="shortcut icon" href="/favicon.ico?v=40">
  <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png?v=40">
  <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png?v=40">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png?v=40">
  <link rel="stylesheet" href="/app.css?v=40">
  <title>Home Care</title>
</head>
<body>
  <div id="app" aria-live="polite">
    <main class="boot-screen">
      <div class="brand-lockup"><span class="brand-mark">HC</span><span>Home Care</span></div>
      <div class="spinner" aria-hidden="true"></div>
      <p>Preparazione dell’app…</p>
    </main>
  </div>

  <div id="toastRegion" class="toast-region" aria-live="assertive" aria-atomic="true"></div>
  <div id="offlineBanner" class="offline-banner" hidden>Sei offline. I dati riservati torneranno disponibili appena la connessione sarà ripristinata.</div>
  <section id="updateCard" class="update-card" hidden aria-label="Aggiornamento disponibile">
    <div><strong>Nuova versione disponibile</strong><small>Aggiorna per usare le ultime correzioni.</small></div>
    <button id="updateButton" class="button light compact" type="button" data-apply-update>Aggiorna</button>
  </section>

  <script src="/app.js?v=40" defer></script>
  <script src="/install-app.js?v=40" defer></script>
</body>
</html>
