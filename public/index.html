<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="theme-color" content="#06243a">
  <link rel="manifest" href="/manifest.json">
  <title>Home Care</title>
  <style>
    :root{--navy:#06243a;--navy2:#0b466b;--gold:#c7952d;--teal:#0f8b8d;--green:#287344;--red:#b42318;--bg:#f5f1e8;--card:#fffdf7;--line:#e2d7c8;--muted:#64748b}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:#09243d;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif}a{color:var(--teal);font-weight:800}.top{position:sticky;top:0;z-index:10;background:linear-gradient(120deg,var(--navy),var(--navy2));color:white;padding:15px 18px;display:flex;align-items:center;justify-content:space-between;gap:12px;box-shadow:0 8px 24px rgba(0,0,0,.16)}.brand{font-size:23px;font-weight:1000}.brand span{color:var(--gold)}.wrap{max-width:1240px;margin:0 auto;padding:18px}.btn{border:0;border-radius:13px;padding:11px 15px;background:var(--navy);color:white;font-weight:900;cursor:pointer;text-decoration:none;display:inline-flex;gap:7px;align-items:center;justify-content:center}.btn.small{padding:8px 10px;font-size:13px}.btn.gold{background:var(--gold);color:#071d30}.btn.teal{background:var(--teal)}.btn.green{background:var(--green)}.btn.red{background:var(--red)}.btn.light{background:#e8eff3;color:#09243d}.hero{display:grid;grid-template-columns:1.1fr .9fr;gap:22px;align-items:center;padding:42px 0}.hero h1{font-size:clamp(40px,6vw,72px);line-height:.95;margin:0 0 18px}.hero h1 span{color:var(--gold)}.hero p{font-size:19px;line-height:1.55}.pill{display:inline-flex;border-radius:999px;background:#e8f7f7;color:#076163;padding:8px 12px;font-weight:900}.card{background:var(--card);border:1px solid var(--line);border-radius:24px;padding:17px;box-shadow:0 10px 26px rgba(6,36,58,.07)}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:14px}.plan h3{font-size:25px;margin:0}.price{font-size:34px;font-weight:1000;margin:10px 0;color:var(--navy)}ul.clean{list-style:none;padding:0;margin:12px 0}ul.clean li{position:relative;margin:9px 0;padding-left:25px}ul.clean li:before{content:'✓';position:absolute;left:0;color:var(--gold);font-weight:1000}.loginBox{max-width:480px;margin:32px auto;background:white;border:1px solid var(--line);border-radius:28px;padding:28px;box-shadow:0 20px 60px rgba(6,36,58,.16)}label{display:block;font-size:13px;font-weight:900;margin:10px 0 5px}input,select,textarea{width:100%;border:1px solid #d8d0c5;border-radius:12px;padding:12px;background:white;font:inherit}textarea{min-height:88px}.tabs{display:flex;gap:8px;overflow:auto;padding:12px 0}.tab{white-space:nowrap;border:1px solid #d8d0c5;background:white;border-radius:999px;padding:10px 14px;font-weight:900;cursor:pointer}.tab.active{background:var(--navy);color:white;border-color:var(--navy)}.layout{display:grid;grid-template-columns:260px 1fr;gap:16px;max-width:1380px;margin:0 auto;padding:16px}.side{background:var(--card);border:1px solid var(--line);border-radius:24px;padding:14px;height:calc(100vh - 94px);position:sticky;top:78px}.side button{display:flex;width:100%;justify-content:flex-start;margin:6px 0}.main{min-width:0}.row{display:grid;grid-template-columns:repeat(12,1fr);gap:14px}.col3{grid-column:span 3}.col4{grid-column:span 4}.col6{grid-column:span 6}.col8{grid-column:span 8}.col12{grid-column:span 12}.stat{font-size:34px;font-weight:1000;color:var(--navy)}table{width:100%;border-collapse:collapse;background:white;border-radius:16px;overflow:hidden}th,td{padding:10px;border-bottom:1px solid #eee;text-align:left;vertical-align:top;font-size:14px}th{background:#f3eee5;color:#475569;text-transform:uppercase;font-size:12px}.badge{display:inline-flex;border-radius:999px;padding:5px 9px;font-size:12px;font-weight:900;background:#e9eef5}.ok{background:#e4f6eb;color:#176b35}.bad{background:#fee4e2;color:#9a1d13}.warn{background:#fff4d6;color:#8a5d00}.notice{border-left:5px solid var(--gold);background:#fff8e8;border-radius:12px;padding:12px;margin:12px 0}.error{border-left-color:var(--red);background:#fff1f0}.success{border-left-color:var(--green);background:#ecfdf3}.muted{color:var(--muted)}.photos{display:flex;gap:8px;flex-wrap:wrap}.photos img{width:110px;height:82px;object-fit:cover;border-radius:10px;border:1px solid #ddd}.chat{display:flex;flex-direction:column;gap:8px;max-height:420px;overflow:auto;background:#f8fafc;border:1px solid #e2e8f0;border-radius:18px;padding:12px}.msg{max-width:82%;padding:10px 12px;border-radius:16px;background:white;border:1px solid #e2e8f0}.msg.me{margin-left:auto;background:#e8f7f7}.msg.home{background:#06243a;color:white}.hide{display:none!important}.mobileMenu{display:none}@media(max-width:860px){.hero,.layout,.row{grid-template-columns:1fr}.col3,.col4,.col6,.col8{grid-column:span 12}.side{display:none;position:static;height:auto}.side.open{display:block}.mobileMenu{display:inline-flex}.wrap,.layout{padding:12px}.top{align-items:flex-start}.hero p{font-size:17px}th,td{font-size:12px}}
  </style>
</head>
<body><div id="app"></div>
<script>
const app=document.getElementById('app');
const S={token:localStorage.getItem('hc_token'),user:null,config:null,tab:'dashboard',clientTab:'home',customers:[],properties:[]};
const P={base:'Base',comfort:'Comfort',premium:'Premium',villa_giardino:'Villa & Giardino',localita_limitrofe:'Località Limitrofe'};
const PRICE={base:'39 €/mese',comfort:'79 €/mese',premium:'199 €/mese',villa_giardino:'da 300 €/mese',localita_limitrofe:'da 150 €/mese'};
const PLAN_LIST=['base','comfort','premium','villa_giardino','localita_limitrofe'];
const money=c=>new Intl.NumberFormat('it-IT',{style:'currency',currency:'EUR'}).format((+c||0)/100);
const esc=s=>String(s??'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));
async function api(url,opt={}){const headers=opt.body instanceof FormData?{}:{'Content-Type':'application/json'};if(S.token)headers.Authorization='Bearer '+S.token;const r=await fetch(url,{...opt,headers:{...headers,...(opt.headers||{})}});const ct=r.headers.get('content-type')||'';const d=ct.includes('json')?await r.json():await r.text();if(!r.ok)throw new Error(d.error||d||'Errore');return d}
function note(t,k='notice'){return `<div class="notice ${k}">${t}</div>`}function logout(){localStorage.removeItem('hc_token');location.href='/?v=8'}
async function boot(){try{S.config=await api('/api/config',{headers:{}})}catch(e){}if(!S.token)return publicHome();try{S.user=(await api('/api/auth/me')).user;shell()}catch(e){localStorage.removeItem('hc_token');publicHome(e.message)}}
function topPublic(){return `<div class="top"><div class="brand">⌂ Home <span>Care</span></div><div><button class="btn light small" onclick="authView('login')">Accedi</button> <button class="btn gold small" onclick="authView('register')">Registrati</button></div></div>`}
function topPrivate(){return `<div class="top"><div><button class="btn light small mobileMenu" onclick="document.querySelector('.side')?.classList.toggle('open')">☰ Menu</button> <span class="brand">⌂ Home <span>Care</span></span></div><div>${esc(S.user?.name)} · ${S.user?.role==='helper'?'Aiutante':S.user?.role==='admin'?'Admin':'Cliente'} <button class="btn light small" onclick="logout()">Esci</button></div></div>`}
function planCards(){const copy={base:['1 controllo completo al mese','Verifica accessi, porte e finestre','Report fotografico dopo ogni visita'],comfort:['2 controlli completi al mese','Aerazione ambienti','Verifica visiva impianti accessibili','Ritiro posta o piccole consegne'],premium:['Controllo settimanale','Preparazione casa con 15 giorni di preavviso','Report fotografici dettagliati','Priorità nella pianificazione interventi'],villa_giardino:['Servizio Premium incluso','Cura ordinaria giardino','Aree esterne, cancelli e recinzioni'],localita_limitrofe:['Per immobili fuori dal comune di Badesi','Prezzo in base a distanza e frequenza','Servizi personalizzati']};return `<div class="grid">${PLAN_LIST.map(id=>`<div class="card plan"><h3>${P[id]}</h3><div class="price">${PRICE[id]}</div><ul class="clean">${copy[id].map(x=>`<li>${x}</li>`).join('')}</ul><button class="btn ${id==='base'?'gold':'teal'}" onclick="selectService('${id}')">Richiedi questo servizio</button></div>`).join('')}</div>`}
function publicHome(err=''){app.innerHTML=topPublic()+`<main class="wrap"><section class="hero"><div><span class="pill">Badesi e località limitrofe</span><h1>Ci prendiamo cura della <span>tua casa</span></h1><p>Controlli periodici, manutenzioni e report fotografici per seconde case, appartamenti e ville. Anche quando sei lontano, hai un referente di fiducia.</p><div><button class="btn gold" onclick="document.getElementById('plans').scrollIntoView({behavior:'smooth'})">Vedi i servizi</button> <button class="btn" onclick="authView('register')">Registrati</button> <button class="btn light" onclick="authView('login')">Accedi</button></div>${err?note(err,'error'):''}</div><div class="card"><h2>Come funziona</h2><p>1. Scegli il servizio più adatto.<br>2. Registrati e conferma la mail.<br>3. Inserisci l’immobile da affidare a Home Care.<br>4. Valutiamo la richiesta e pianifichiamo i controlli.</p><p class="muted">Il GPS esatto viene salvato da Home Care al primo controllo.</p></div></section><section id="plans"><h2>Scegli un servizio</h2>${planCards()}</section></main>`}
function selectService(id){localStorage.setItem('hc_selected_package',id);if(S.token&&S.user?.role==='client'){S.clientTab='properties';clientShell()}else authView('register',id)}
function authView(mode='login',pkg='base'){app.innerHTML=topPublic()+`<div class="wrap"><div class="loginBox"><h1>${mode==='login'?'Accedi':'Registrati'}</h1><div class="tabs"><button class="tab ${mode==='login'?'active':''}" onclick="authView('login')">Accedi</button><button class="tab ${mode==='register'?'active':''}" onclick="authView('register')">Registrati</button></div><div class="${mode==='login'?'':'hide'}"><form id="loginForm"><label>Email</label><input name="email" type="email" required><label>Password</label><input name="password" type="password" required><br><br><button class="btn" style="width:100%">Accedi</button></form></div><div class="${mode==='register'?'':'hide'}"><form id="regForm"><input type="hidden" name="package_hint" value="${pkg}"><label>Nome e cognome</label><input name="name" required><label>Email</label><input name="email" type="email" required><label>Telefono</label><input name="phone"><label>Password</label><input name="password" type="password" minlength="8" required><br><br><button class="btn teal" style="width:100%">Registrati</button></form><div id="regMsg"></div></div></div></div>`;document.getElementById('loginForm').onsubmit=async e=>{e.preventDefault();try{const r=await api('/api/auth/login',{method:'POST',body:JSON.stringify(Object.fromEntries(new FormData(e.target)))});localStorage.setItem('hc_token',r.token);S.token=r.token;S.user=r.user;shell()}catch(x){alert(x.message)}};document.getElementById('regForm').onsubmit=async e=>{e.preventDefault();const box=document.getElementById('regMsg');try{const r=await api('/api/auth/register',{method:'POST',body:JSON.stringify(Object.fromEntries(new FormData(e.target)))});box.innerHTML=note(`${esc(r.message)}${r.confirmationUrl?'<br><br><a href="'+r.confirmationUrl+'">Apri link conferma test</a>':''}`,'success')}catch(x){box.innerHTML=note(x.message,'error')}}}
function shell(){S.user.role==='client'?clientShell():adminShell()}
function side(items,current,setter){return `<aside class="side">${items.map(i=>`<button class="btn ${current===i.id?'gold':'light'}" onclick="${setter}('${i.id}')">${i.label}</button>`).join('')}</aside>`}
function clientSet(tab){S.clientTab=tab;clientShell()}function adminSet(tab){S.tab=tab;adminShell()}
async function clientData(){return await api('/api/client/dashboard')}
async function clientShell(){app.innerHTML=topPrivate()+`<div class="layout">${side([{id:'home',label:'Home'},{id:'properties',label:'Immobili'},{id:'reports',label:'Report'},{id:'payments',label:'Pagamenti / Preventivi'},{id:'chat',label:'Chat Home Care'}],S.clientTab,'clientSet')}<main class="main" id="main">Caricamento...</main></div>`;const d=await clientData();if(S.clientTab==='home')clientHome(d);if(S.clientTab==='properties')clientProperties(d);if(S.clientTab==='reports')clientReports(d);if(S.clientTab==='payments')clientPayments(d);if(S.clientTab==='chat')clientChat()}
function clientHome(d){const latest=d.reports.slice(0,3),pending=d.payments.filter(p=>p.status==='pending'),upcoming=d.properties.filter(p=>p.active).slice(0,5);document.getElementById('main').innerHTML=`<div class="grid"><div class="card"><h3>Stato</h3><span class="badge ${d.customer?.payment_valid?'ok':'bad'}">${d.customer?.payment_valid?'Pagamento regolare':'Pagamento non regolare'}</span><p>Piano cliente: <b>${P[d.customer?.current_package_type]||'Non ancora attivo'}</b></p></div><div class="card"><h3>Prossime scadenze</h3>${upcoming.length?upcoming.map(p=>`<p><b>${esc(p.name)}</b><br>Prossimo controllo: ${p.next_check_date||'-'}</p>`).join(''):'<p>Nessun controllo pianificato.</p>'}</div><div class="card"><h3>Preventivi / extra da pagare</h3>${pending.length?pending.map(p=>`<p><b>${money(p.amount_cents)}</b><br>${esc(p.description)}</p>`).join(''):'<p>Nessun pagamento extra in sospeso.</p>'}</div></div><div class="card" style="margin-top:14px"><h2>Ultimi report</h2>${latest.length?latest.map(reportHtml).join(''):'<p>Nessun report disponibile.</p>'}</div>`}
function reportHtml(r){let photos=[];try{photos=Array.isArray(r.photo_urls)?r.photo_urls:JSON.parse(r.photo_urls||'[]')}catch(e){}let checklist=[];try{checklist=Array.isArray(r.checklist_json)?r.checklist_json:JSON.parse(r.checklist_json||'[]')}catch(e){}return `<div class="notice"><b>${esc(r.property_name)}</b> · ${r.completed_at?new Date(r.completed_at).toLocaleDateString('it-IT'):'-' }<p>${esc(r.notes||'')}</p>${checklist.length?`<ul class="clean">${checklist.map(x=>`<li>${esc(x)}</li>`).join('')}</ul>`:''}<div class="photos">${photos.map(u=>`<a href="${u}" target="_blank"><img src="${u}"></a>`).join('')}</div></div>`}
function clientProperties(d){const selected=localStorage.getItem('hc_selected_package')||'base';document.getElementById('main').innerHTML=`<div class="card"><h2>Aggiungi immobile da affidare a Home Care</h2><form id="clientProp"><label>Nome immobile</label><input name="name" required placeholder="Casa al mare, Villetta, Appartamento"><label>Indirizzo completo</label><input name="address" required><div class="row"><div class="col6"><label>Comune</label><input name="city" value="Badesi"></div><div class="col6"><label>Zona / località</label><input name="zone"></div></div><label>Tipo immobile</label><select name="property_type"><option>Appartamento</option><option>Villetta</option><option>Villa con giardino</option><option>Altro</option></select><label>Servizio richiesto</label><select name="package_type">${PLAN_LIST.map(k=>`<option value="${k}" ${selected===k?'selected':''}>${P[k]} - ${PRICE[k]}</option>`).join('')}</select><label>Note utili</label><textarea name="notes"></textarea><button class="btn teal">Invia richiesta</button></form><div id="propMsg"></div></div><div class="card" style="margin-top:14px"><h2>I miei immobili</h2>${d.properties.length?`<table><thead><tr><th>Immobile</th><th>Indirizzo</th><th>Servizio</th><th>Stato</th><th>Prossimo controllo</th></tr></thead><tbody>${d.properties.map(p=>`<tr><td><b>${esc(p.name)}</b></td><td>${esc(p.address)}<br>${esc(p.city)}</td><td>${P[p.package_type]||p.package_type}</td><td><span class="badge ${p.request_status==='pending'?'warn':p.active?'ok':'bad'}">${p.request_status==='pending'?'In attesa di verifica':p.active?'Attivo':'Non attivo'}</span></td><td>${p.next_check_date||'-'}</td></tr>`).join('')}</tbody></table>`:'<p>Nessun immobile inserito.</p>'}</div>`;document.getElementById('clientProp').onsubmit=async e=>{e.preventDefault();const box=document.getElementById('propMsg');try{await api('/api/client/properties',{method:'POST',body:JSON.stringify(Object.fromEntries(new FormData(e.target)))});localStorage.removeItem('hc_selected_package');box.innerHTML=note('Richiesta inviata. Home Care controllerà i dati e ti risponderà.','success');setTimeout(clientShell,800)}catch(x){box.innerHTML=note(x.message,'error')}}}
function clientReports(d){document.getElementById('main').innerHTML=`<div class="card"><h2>Report controlli</h2>${d.reports.length?d.reports.map(reportHtml).join(''):'<p>Nessun report disponibile.</p>'}</div>`}
function clientPayments(d){document.getElementById('main').innerHTML=`<div class="card"><h2>Pagamenti / Preventivi manutenzione</h2>${d.payments.length?`<table><thead><tr><th>Descrizione</th><th>Importo</th><th>Stato</th></tr></thead><tbody>${d.payments.map(p=>`<tr><td>${esc(p.description)}</td><td>${money(p.amount_cents)}</td><td><span class="badge ${p.status==='paid'?'ok':'warn'}">${p.status}</span></td></tr>`).join('')}</tbody></table>`:'<p>Nessun preventivo o extra.</p>'}</div>`}
async function clientChat(){document.getElementById('main').innerHTML='<div class="card"><h2>Chat Home Care</h2><div id="chatBox">Caricamento...</div></div>';const r=await api('/api/client/messages');document.getElementById('chatBox').innerHTML=`<div class="chat">${r.messages.map(m=>`<div class="msg ${m.sender_role==='client'?'me':'home'}"><b>${m.sender_role==='client'?'Tu':'Home Care'}</b><br>${esc(m.body)}<br><small>${new Date(m.created_at).toLocaleString('it-IT')}</small></div>`).join('')}</div><form id="msgForm" style="margin-top:10px"><textarea name="body" required placeholder="Scrivi a Home Care..."></textarea><button class="btn">Invia</button></form>`;document.getElementById('msgForm').onsubmit=async e=>{e.preventDefault();await api('/api/client/messages',{method:'POST',body:JSON.stringify(Object.fromEntries(new FormData(e.target)))});clientChat()}}
async function loadBase(){const[c,p]=await Promise.all([api('/api/admin/customers'),api('/api/admin/properties')]);S.customers=c.customers;S.properties=p.properties}
async function adminShell(){app.innerHTML=topPrivate()+`<div class="layout">${side([{id:'dashboard',label:'Dashboard'},{id:'requests',label:'Richieste immobili'},{id:'customers',label:'Clienti'},{id:'properties',label:'Immobili/GPS'},{id:'checks',label:'Controlli'},{id:'reports',label:'Report'},{id:'tasks',label:'Cose da fare'},{id:'route',label:'Giro'}].concat(S.user.role==='admin'?[{id:'payments',label:'Pagamenti'},{id:'messages',label:'Messaggi'},{id:'helpers',label:'Aiutanti'}]:[]),S.tab,'adminSet')}<main class="main" id="main">Caricamento...</main></div>`;await loadBase();({dashboard:adminDashboard,requests:adminRequests,customers:adminCustomers,properties:adminProperties,checks:adminChecks,reports:adminReports,tasks:adminTasks,route:adminRoute,payments:adminPayments,messages:adminMessages,helpers:adminHelpers}[S.tab]||adminDashboard)()}
function opts(){return S.customers.map(c=>`<option value="${c.id}">${esc(c.name)}</option>`).join('')}
async function adminDashboard(){const s=await api('/api/admin/summary');document.getElementById('main').innerHTML=`<div class="grid"><div class="card"><div class="muted">Clienti</div><div class="stat">${s.customers}</div></div><div class="card"><div class="muted">Richieste immobili</div><div class="stat">${s.pendingProperties||0}</div><button class="btn small gold" onclick="adminSet('requests')">Vai</button></div><div class="card"><div class="muted">Controlli da fare</div><div class="stat">${s.dueChecks}</div></div><div class="card"><div class="muted">Sospesi pagamento</div><div class="stat">${s.blockedChecks}</div></div><div class="card"><div class="muted">Cose da fare</div><div class="stat">${s.todoTasks}</div></div></div>`}
async function adminRequests(){const r=await api('/api/admin/property-requests');document.getElementById('main').innerHTML=`<div class="card"><h2>Richieste immobili da approvare</h2>${r.requests.length?`<table><thead><tr><th>Cliente</th><th>Immobile</th><th>Servizio richiesto</th><th>Note</th><th></th></tr></thead><tbody>${r.requests.map(p=>`<tr><td>${esc(p.customer_name)}<br>${esc(p.customer_phone)}<br>${esc(p.customer_email)}</td><td><b>${esc(p.name)}</b><br>${esc(p.address)}<br>${esc(p.city)} ${esc(p.zone)}</td><td>${P[p.package_type]||p.package_type}</td><td>${esc(p.client_notes||p.notes||'')}</td><td><select id="pkg-${p.id}">${PLAN_LIST.map(k=>`<option value="${k}" ${p.package_type===k?'selected':''}>${P[k]}</option>`).join('')}</select><br><button class="btn small green" onclick="approveProp('${p.id}')">Approva</button></td></tr>`).join('')}</tbody></table>`:'<p>Nessuna richiesta in attesa.</p>'}</div>`}
async function approveProp(id){const package_type=document.getElementById('pkg-'+id)?.value;await api(`/api/admin/properties/${id}/approve`,{method:'POST',body:JSON.stringify({package_type})});alert('Immobile approvato');adminSet('requests')}
async function adminCustomers(){document.getElementById('main').innerHTML=`<div class="row"><div class="col4"><div class="card"><h3>Nuovo cliente</h3><form id="customerForm"><label>Nome</label><input name="name" required><label>Email</label><input name="email" type="email"><label>Telefono</label><input name="phone"><label>Piano</label><select name="current_package_type"><option value="">Nessuno</option>${PLAN_LIST.map(k=>`<option value="${k}">${P[k]}</option>`).join('')}</select><label>Note</label><textarea name="notes"></textarea><button class="btn">Salva</button></form></div><div class="card"><h3>Pagamento manuale piano</h3><form id="manualPay"><label>Cliente</label><select name="customer_id">${opts()}</select><label>Piano pagato</label><select name="package_type">${PLAN_LIST.map(k=>`<option value="${k}">${P[k]} - ${PRICE[k]}</option>`).join('')}</select><label>Importo</label><input name="amount_euro"><label>Pagato fino al</label><input name="paid_until" type="date" required><label>Metodo</label><select name="method"><option>contanti</option><option>bonifico</option><option>assegno</option><option>altro</option></select><button class="btn green">Registra pagamento</button></form></div></div><div class="col8"><div class="card"><h2>Clienti</h2><table><thead><tr><th>Cliente</th><th>Contatto</th><th>Piano</th><th>Stato</th><th>Immobili</th><th></th></tr></thead><tbody>${S.customers.map(c=>`<tr><td><b>${esc(c.name)}</b></td><td>${esc(c.email)}<br>${esc(c.phone)}</td><td><b>${P[c.current_package_type]||'Nessuno'}</b></td><td>${c.payment_valid===undefined?'operativo':`<span class="badge ${c.payment_valid?'ok':'bad'}">${c.payment_valid?'regolare':'sospeso'}</span>`}<br>${c.paid_until?`fino al ${c.paid_until}`:''}</td><td>${c.properties_count||0}</td><td>${S.user.role==='admin'?`<button class="btn small red" onclick="removeCustomer('${c.id}','${esc(c.name).replace(/'/g,"\\'")}')">Elimina</button>`:''}</td></tr>`).join('')}</tbody></table></div></div></div>`;document.getElementById('customerForm').onsubmit=async e=>{e.preventDefault();await api('/api/admin/customers',{method:'POST',body:JSON.stringify(Object.fromEntries(new FormData(e.target)))});adminShell()};document.getElementById('manualPay').onsubmit=async e=>{e.preventDefault();const f=Object.fromEntries(new FormData(e.target));await api(`/api/admin/customers/${f.customer_id}/manual-payment`,{method:'POST',body:JSON.stringify(f)});alert('Pagamento registrato e piano aggiornato');adminShell()}}
async function removeCustomer(id,name){if(!confirm('Operazione definitiva: rimuove cliente, account, immobili e dati collegati. Continuare?'))return;const c1=prompt('Scrivi ELIMINA');if(c1!=='ELIMINA')return;const c2=prompt('Scrivi esattamente il nome cliente:\n'+name);if(c2!==name)return;const c3=prompt('Scrivi CONFERMO');if(c3!=='CONFERMO')return;await api(`/api/admin/customers/${id}/remove-final`,{method:'POST',body:JSON.stringify({confirm1:c1,confirm2:c2,confirm3:c3})});alert('Cliente eliminato');adminShell()}
async function adminProperties(){document.getElementById('main').innerHTML=`<div class="card"><h2>Immobili / GPS</h2><table><thead><tr><th>Immobile</th><th>Cliente</th><th>Servizio</th><th>Stato</th><th>GPS</th><th></th></tr></thead><tbody>${S.properties.map(p=>`<tr><td><b>${esc(p.name)}</b><br>${esc(p.address)} ${esc(p.city)}<br><span class="muted">${esc(p.client_notes||p.notes||'')}</span></td><td>${esc(p.customer_name)}<br>${esc(p.customer_phone||'')}</td><td>${P[p.package_type]||p.package_type}${p.monthly_price_cents?'<br>'+money(p.monthly_price_cents):''}</td><td><span class="badge ${p.request_status==='pending'?'warn':p.active?'ok':'bad'}">${p.request_status==='pending'?'Da approvare':p.active?'Attivo':'Non attivo'}</span></td><td>${p.latitude&&p.longitude?`📍 ${p.latitude}, ${p.longitude}<br><a target="_blank" href="https://www.google.com/maps?q=${p.latitude},${p.longitude}">Maps</a>`:'Non salvato'}</td><td><button class="btn small teal" onclick="gpsProp('${p.id}')">Salva GPS</button></td></tr>`).join('')}</tbody></table></div>`}
function gpsProp(id){navigator.geolocation.getCurrentPosition(async p=>{await api(`/api/admin/properties/${id}/location`,{method:'POST',body:JSON.stringify({latitude:p.coords.latitude,longitude:p.coords.longitude})});adminShell()},e=>alert(e.message),{enableHighAccuracy:true})}
async function adminChecks(){const r=await api('/api/admin/due-checks');document.getElementById('main').innerHTML=`<div class="card"><h2>Controlli da fare</h2><div id="completeBox"></div><table><thead><tr><th>Cliente/Immobile</th><th>Piano</th><th>Stato</th><th></th></tr></thead><tbody>${r.checks.map(p=>`<tr><td><b>${esc(p.customer_name)}</b><br>${esc(p.name)}<br>${esc(p.address)}</td><td>${P[p.package_type]||p.package_type}</td><td>${p.blocked?'<span class="badge bad">pagamento non regolare</span>':'<span class="badge ok">eseguibile</span>'}</td><td>${p.blocked?'':`<button class="btn small green" onclick="completeCheck('${p.id}','${p.package_type}')">Completa controllo</button>`}</td></tr>`).join('')}</tbody></table></div>`}
function completeCheck(id,pkg){const list=S.config?.checklists?.[pkg]||[];document.getElementById('completeBox').innerHTML=`<div class="notice"><h3>Checklist ${P[pkg]||pkg}</h3><form id="completeForm"><input type="hidden" name="property_id" value="${id}">${list.map(x=>`<label><input type="checkbox" name="ck" value="${esc(x)}" checked style="width:auto"> ${esc(x)}</label>`).join('')}<label>Note report</label><textarea name="notes"></textarea><label>Foto</label><input name="photos" type="file" multiple accept="image/*"><br><br><button class="btn green">Salva report controllo</button></form></div>`;document.getElementById('completeForm').onsubmit=async e=>{e.preventDefault();const fd=new FormData(e.target);const done=[...e.target.querySelectorAll('input[name=ck]:checked')].map(i=>i.value);fd.delete('ck');fd.append('checklist_json',JSON.stringify(done));await api('/api/admin/checks/complete',{method:'POST',body:fd});alert('Controllo salvato. Il report è visibile in Report e lato cliente.');adminSet('reports')}}
async function adminReports(){const r=await api('/api/admin/reports');document.getElementById('main').innerHTML=`<div class="card"><h2>Report controlli eseguiti</h2>${r.reports.length?r.reports.map(rep=>`<div class="notice"><b>${esc(rep.customer_name)}</b> · ${esc(rep.property_name)} · ${rep.completed_at?new Date(rep.completed_at).toLocaleString('it-IT'):'-'}<p>Piano: <b>${P[rep.package_type]||rep.package_type}</b></p>${reportHtml(rep)}</div>`).join(''):'<p>Nessun report.</p>'}</div>`}
async function adminTasks(){document.getElementById('main').innerHTML='<div class="card"><h2>Cose da fare</h2><p>Sezione operativa in sviluppo.</p></div>'}
async function adminRoute(){document.getElementById('main').innerHTML=`<div class="card"><h2>Organizza giro</h2><button class="btn teal" onclick="loadRoute()">Calcola con GPS</button><div id="routeRes"></div></div>`}function loadRoute(){navigator.geolocation.getCurrentPosition(async p=>{const r=await api(`/api/admin/route-plan?lat=${p.coords.latitude}&lng=${p.coords.longitude}`);document.getElementById('routeRes').innerHTML=`<h3>${r.totalKm} km stimati</h3><table><tbody>${r.properties.map((x,i)=>`<tr><td>${i+1}</td><td>${esc(x.name)}<br>${esc(x.customer_name)}</td><td>${x.distance_from_previous_km} km</td><td><a target="_blank" href="https://www.google.com/maps?q=${x.latitude},${x.longitude}">Maps</a></td></tr>`).join('')}</tbody></table>`},e=>alert(e.message),{enableHighAccuracy:true})}
async function adminPayments(){const[ex,mp]=await Promise.all([api('/api/admin/extra-payments'),api('/api/admin/manual-payments')]);document.getElementById('main').innerHTML=`<div class="row"><div class="col4"><div class="card"><h3>Extra / preventivo manutenzione</h3><form id="extraForm"><label>Cliente</label><select name="customer_id">${opts()}</select><label>Importo</label><input name="amount_euro" required><label>Descrizione</label><textarea name="description" required></textarea><button class="btn gold">Crea</button></form></div></div><div class="col8"><div class="card"><h2>Extra</h2><table><tbody>${ex.payments.map(p=>`<tr><td>${esc(p.customer_name)}</td><td>${esc(p.description)}</td><td>${money(p.amount_cents)}</td><td>${p.status}</td></tr>`).join('')}</tbody></table></div><div class="card"><h2>Pagamenti manuali</h2><table><tbody>${mp.payments.map(p=>`<tr><td>${esc(p.customer_name)}</td><td>${money(p.amount_cents)}</td><td>${P[p.package_type]||p.package_type||'-'}</td><td>${p.paid_until||''}</td></tr>`).join('')}</tbody></table></div></div></div>`;document.getElementById('extraForm').onsubmit=async e=>{e.preventDefault();await api('/api/admin/extra-payments',{method:'POST',body:JSON.stringify(Object.fromEntries(new FormData(e.target)))});adminPayments()}}
async function adminMessages(){const r=await api('/api/admin/messages');document.getElementById('main').innerHTML=`<div class="row"><div class="col4"><div class="card"><h3>Scrivi al cliente</h3><form id="admMsg"><label>Cliente</label><select name="customer_id">${opts()}</select><label>Messaggio</label><textarea name="body" required></textarea><button class="btn">Invia come Home Care</button></form></div></div><div class="col8"><div class="card"><h2>Messaggi recenti</h2><div class="chat">${r.messages.reverse().map(m=>`<div class="msg ${m.sender_role==='admin'?'home':'me'}"><b>${m.sender_role==='admin'?'Home Care':esc(m.customer_name)}</b><br>${esc(m.body)}<br><small>${new Date(m.created_at).toLocaleString('it-IT')}</small></div>`).join('')}</div></div></div></div>`;document.getElementById('admMsg').onsubmit=async e=>{e.preventDefault();await api('/api/admin/messages',{method:'POST',body:JSON.stringify(Object.fromEntries(new FormData(e.target)))});adminMessages()}}
async function adminHelpers(){const r=await api('/api/admin/helpers');document.getElementById('main').innerHTML=`<div class="card"><h2>Aiutanti</h2><form id="helperForm"><div class="row"><div class="col3"><input name="name" placeholder="Nome" required></div><div class="col3"><input name="email" type="email" placeholder="Email" required></div><div class="col3"><input name="phone" placeholder="Telefono"></div><div class="col3"><input name="password" type="password" placeholder="Password" minlength="8" required></div></div><br><button class="btn">Crea aiutante</button></form>${note('Gli aiutanti non vedono importi, incassi, Stripe o pagamenti.','success')}<table><tbody>${r.helpers.map(h=>`<tr><td>${esc(h.name)}</td><td>${esc(h.email)}</td><td>${esc(h.phone)}</td></tr>`).join('')}</tbody></table></div>`;document.getElementById('helperForm').onsubmit=async e=>{e.preventDefault();await api('/api/admin/helpers',{method:'POST',body:JSON.stringify(Object.fromEntries(new FormData(e.target)))});adminHelpers()}}
if('serviceWorker'in navigator)navigator.serviceWorker.register('/sw.js').catch(()=>{});boot();
</script></body></html>
