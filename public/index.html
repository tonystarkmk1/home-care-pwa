<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="theme-color" content="#06243a">
  <link rel="manifest" href="/manifest.json">
  <title>Home Care</title>
  <style>
    :root{--navy:#06243a;--navy2:#0c466a;--teal:#0f8b8d;--gold:#c7952d;--green:#287344;--red:#b42318;--bg:#f5f1e8;--card:#fffdf7;--muted:#687386;--line:#e3d8c9}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:#0a2540;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif}a{color:var(--teal);font-weight:800}.top{position:sticky;top:0;z-index:5;background:linear-gradient(120deg,var(--navy),var(--navy2));color:white;padding:16px 20px;display:flex;align-items:center;justify-content:space-between;gap:12px;box-shadow:0 8px 24px rgba(0,0,0,.14)}.brand{font-size:23px;font-weight:1000}.brand span{color:var(--gold)}.wrap{max-width:1220px;margin:0 auto;padding:18px}.hero{display:grid;grid-template-columns:1.1fr .9fr;gap:22px;align-items:center;padding:44px 0}.hero h1{font-size:clamp(38px,6vw,70px);line-height:.96;margin:0 0 18px;color:var(--navy)}.hero h1 span{color:var(--gold)}.hero p{font-size:20px;line-height:1.55;color:#24364a}.heroBox{background:linear-gradient(150deg,#fffdf7,#e9f7fb);border:1px solid var(--line);border-radius:34px;padding:28px;box-shadow:0 20px 60px rgba(6,36,58,.12)}.pill{display:inline-flex;gap:8px;align-items:center;border-radius:999px;background:#eef8f8;color:#075f60;padding:8px 12px;font-weight:900;font-size:14px}.actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:20px}.btn{border:0;border-radius:14px;padding:12px 16px;background:var(--navy);color:white;font-weight:1000;cursor:pointer;text-decoration:none;display:inline-flex;gap:8px;align-items:center;justify-content:center}.btn:hover{filter:brightness(1.05)}.btn.small{padding:8px 10px;font-size:13px}.btn.light{background:#e8eff3;color:#0a2540}.btn.gold{background:var(--gold);color:#071d30}.btn.green{background:var(--green)}.btn.teal{background:var(--teal)}.btn.red{background:var(--red)}.sectionTitle{display:flex;align-items:end;justify-content:space-between;gap:14px;margin:24px 0 12px}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:14px}.card{background:var(--card);border:1px solid var(--line);border-radius:24px;padding:18px;box-shadow:0 10px 26px rgba(6,36,58,.07)}.plan{position:relative;min-height:260px}.plan h3{font-size:26px;margin:0 0 4px}.price{font-size:34px;font-weight:1000;color:var(--navy);margin:10px 0}.plan ul{margin:12px 0 0;padding-left:0;list-style:none}.plan li{margin:9px 0;padding-left:26px;position:relative}.plan li:before{content:'✓';position:absolute;left:0;color:var(--gold);font-weight:1000}.loginBox{max-width:480px;margin:28px auto;background:white;border-radius:28px;padding:28px;box-shadow:0 20px 60px rgba(6,36,58,.18)}.tabs{display:flex;gap:8px;overflow:auto;padding:10px 0}.tab{border:1px solid #d8d0c5;background:white;border-radius:999px;padding:10px 14px;white-space:nowrap;font-weight:900;cursor:pointer}.tab.active{background:var(--navy);color:white}.hide{display:none!important}h1,h2,h3{margin:0 0 12px}.muted{color:var(--muted)}label{display:block;font-size:13px;font-weight:900;margin:10px 0 5px}input,select,textarea{width:100%;padding:12px;border:1px solid #d8d0c5;border-radius:12px;background:white;font:inherit}textarea{min-height:86px}.row{display:grid;grid-template-columns:repeat(12,1fr);gap:14px}.col4{grid-column:span 4}.col8{grid-column:span 8}.col6{grid-column:span 6}.col12{grid-column:span 12}.stat{font-size:36px;font-weight:1000;color:var(--navy)}table{width:100%;border-collapse:collapse;background:white;border-radius:16px;overflow:hidden}th,td{padding:10px;border-bottom:1px solid #eee;text-align:left;vertical-align:top;font-size:14px}th{background:#f3eee5;text-transform:uppercase;font-size:12px;color:#4b5563}.badge{display:inline-flex;border-radius:999px;padding:5px 9px;font-size:12px;font-weight:900;background:#e9eef5;color:#0a2540}.ok{background:#e4f6eb;color:#176b35}.bad{background:#fee4e2;color:#9a1d13}.warn{background:#fff4d6;color:#8a5d00}.notice{border-left:5px solid var(--gold);background:#fff8e8;border-radius:12px;padding:12px;margin:12px 0}.error{border-left-color:var(--red);background:#fff1f0}.success{border-left-color:var(--green);background:#ecfdf3}.photos img{width:90px;height:70px;object-fit:cover;border-radius:10px;margin:4px}.chat{display:flex;flex-direction:column;gap:8px;max-height:360px;overflow:auto;background:#f8fafc;border:1px solid #e2e8f0;border-radius:18px;padding:12px}.msg{max-width:82%;padding:10px 12px;border-radius:16px;background:white;border:1px solid #e2e8f0}.msg.me{margin-left:auto;background:#e8f7f7;border-color:#cdeeed}.msg.home{background:#06243a;color:white}.footer{text-align:center;color:var(--muted);padding:34px}@media(max-width:820px){.hero{grid-template-columns:1fr;padding:24px 0}.top{align-items:flex-start;flex-direction:column}.col4,.col8,.col6{grid-column:span 12}.wrap{padding:12px}th,td{font-size:12px}.loginBox{margin:14px 0;border-radius:22px}.stat{font-size:30px}.hero p{font-size:17px}}
  </style>
</head>
<body><div id="app"></div><script>
const S={token:localStorage.getItem('hc_token'),user:null,tab:'dashboard',config:null,customers:[],properties:[],publicMode:'home'},app=document.getElementById('app');
const pkg={base:'Base',comfort:'Comfort',premium:'Premium',villa_giardino:'Villa & Giardino',localita_limitrofe:'Località Limitrofe'},prices={base:'39 €/mese',comfort:'79 €/mese',premium:'199 €/mese',villa_giardino:'da 300 €/mese',localita_limitrofe:'da 150 €/mese'},money=c=>new Intl.NumberFormat('it-IT',{style:'currency',currency:'EUR'}).format((+c||0)/100),esc=s=>String(s||'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));
async function api(url,opt={}){const h=opt.body instanceof FormData?{}:{'Content-Type':'application/json'};if(S.token)h.Authorization='Bearer '+S.token;const r=await fetch(url,{...opt,headers:{...h,...(opt.headers||{})}}),ct=r.headers.get('content-type')||'',d=ct.includes('json')?await r.json():await r.text();if(!r.ok)throw new Error(d.error||d||'Errore');return d}
function note(t,k='notice'){return `<div class="notice ${k}">${t}</div>`}function logout(){localStorage.removeItem('hc_token');location.href='/?v=5'}function header(){return `<div class="top"><div class="brand">⌂ Home <span>Care</span></div><div>${esc(S.user?.name)} · ${S.user?.role==='helper'?'Aiutante':S.user?.role==='admin'?'Admin':'Cliente'} <button class="btn small light" onclick="logout()">Esci</button></div></div>`}
async function boot(){try{S.config=await api('/api/config',{headers:{}})}catch(e){}if(!S.token)return publicHome();try{S.user=(await api('/api/auth/me')).user;shell()}catch(e){localStorage.removeItem('hc_token');publicHome(e.message)}}
function publicTop(){return `<div class="top"><div class="brand">⌂ Home <span>Care</span></div><div class="actions" style="margin:0"><button class="btn light small" onclick="authView('login')">Accedi</button><button class="btn gold small" onclick="authView('register')">Registrati</button></div></div>`}
function planCards(){const items=[['base','Base',['1 controllo completo al mese','Verifica accessi, porte e finestre','Report fotografico dopo ogni visita']],['comfort','Comfort',['2 controlli completi al mese','Aerazione ambienti','Verifica visiva impianti accessibili','Ritiro posta o piccole consegne']],['premium','Premium',['Controllo settimanale','Preparazione casa con 15 giorni di preavviso','Report fotografici dettagliati','Priorità nella pianificazione interventi']],['villa_giardino','Villa & Giardino',['Servizio Premium incluso','Cura ordinaria giardino','Aree esterne, cancelli e recinzioni','Spazi esterni pronti al tuo arrivo']],['localita_limitrofe','Località Limitrofe',['Per immobili fuori dal comune di Badesi','Prezzo in base a distanza e frequenza','Servizi personalizzati']]];return `<div class="grid">${items.map(([id,title,lis])=>`<div class="card plan"><h3>${title}</h3><div class="price">${prices[id]}</div><ul>${lis.map(x=>`<li>${x}</li>`).join('')}</ul><button class="btn ${id==='base'?'gold':'teal'}" onclick="authView('register','${id}')" style="margin-top:14px">Richiedi questo servizio</button></div>`).join('')}</div>`}
function publicHome(err=''){app.innerHTML=publicTop()+`<main class="wrap"><section class="hero"><div><span class="pill">Badesi e località limitrofe</span><h1>Ci prendiamo cura della <span>tua casa</span></h1><p>Controlli periodici, manutenzioni e report fotografici per seconde case, appartamenti e ville. Anche quando sei lontano, hai un referente di fiducia.</p><div class="actions"><button class="btn gold" onclick="document.getElementById('plans').scrollIntoView({behavior:'smooth'})">Vedi i servizi</button><button class="btn" onclick="authView('register')">Registrati</button><button class="btn light" onclick="authView('login')">Accedi</button></div>${err?note(err,'error'):''}</div><div class="heroBox"><h2>Come funziona</h2><p>1. Scegli il servizio più adatto.<br>2. Registrati e conferma la mail.<br>3. Inserisci l’immobile da affidare a Home Care.<br>4. Valutiamo la richiesta e pianifichiamo i controlli.</p><p class="muted">Il GPS esatto viene salvato da Home Care al primo controllo sul posto.</p></div></section><section id="plans"><div class="sectionTitle"><h2>I nostri servizi</h2><span class="muted">Servizi da 39 €/mese</span></div>${planCards()}</section><div class="footer">Home Care · homecarebadesi.com</div></main>`}
function authView(mode='login',packageType='base'){app.innerHTML=publicTop()+`<div class="wrap"><div class="loginBox"><h1>${mode==='login'?'Accedi':'Registrati'}</h1><p class="muted">${mode==='login'?'Entra nella tua area Home Care.':'Crea il tuo account cliente e conferma la mail.'}</p><div class="tabs"><button class="tab ${mode==='login'?'active':''}" onclick="authView('login')">Accedi</button><button class="tab ${mode==='register'?'active':''}" onclick="authView('register')">Registrati</button></div><div id="loginBox" class="${mode==='login'?'':'hide'}"><form id="loginForm"><label>Email</label><input name="email" type="email" required><label>Password</label><input name="password" type="password" required><br><br><button class="btn" style="width:100%">Accedi</button></form></div><div id="regBox" class="${mode==='register'?'':'hide'}"><form id="regForm"><input type="hidden" name="package_hint" value="${packageType}"><label>Nome e cognome</label><input name="name" required><label>Email</label><input name="email" type="email" required><label>Telefono</label><input name="phone"><label>Password</label><input name="password" type="password" minlength="8" required><br><br><button class="btn teal" style="width:100%">Registrati</button></form><div id="regMsg"></div></div></div></div>`;document.getElementById('loginForm').onsubmit=async e=>{e.preventDefault();try{const r=await api('/api/auth/login',{method:'POST',body:JSON.stringify(Object.fromEntries(new FormData(e.target)))});localStorage.setItem('hc_token',r.token);S.token=r.token;S.user=r.user;shell()}catch(x){authView('login');setTimeout(()=>document.querySelector('.loginBox').insertAdjacentHTML('afterbegin',note(x.message,'error')),0)}};document.getElementById('regForm').onsubmit=async e=>{e.preventDefault();const box=document.getElementById('regMsg');try{const r=await api('/api/auth/register',{method:'POST',body:JSON.stringify(Object.fromEntries(new FormData(e.target)))});box.innerHTML=note(`${esc(r.message)}${r.confirmationUrl?'<br><br><a href="'+r.confirmationUrl+'">Apri link conferma test</a>':''}`,'success')}catch(x){box.innerHTML=note(x.message,'error')}}}
function shell(){app.innerHTML=header()+`<div class="wrap" id="content"></div>`;S.user.role==='client'?clientDash():adminApp()}
function nav(ts){return `<div class="tabs">${ts.map(t=>`<button class="tab ${S.tab===t.id?'active':''}" onclick="S.tab='${t.id}';adminApp()">${t.label}</button>`).join('')}</div><div id="panel">Caricamento...</div>`}
async function baseLists(){const[c,p]=await Promise.all([api('/api/admin/customers'),api('/api/admin/properties')]);S.customers=c.customers;S.properties=p.properties}
async function adminApp(){const tabs=[{id:'dashboard',label:'Dashboard'},{id:'customers',label:'Clienti'},{id:'properties',label:'Immobili/GPS'},{id:'checks',label:'Controlli'},{id:'tasks',label:'Cose da fare'},{id:'route',label:'Giro'}];if(S.user.role==='admin')tabs.push({id:'messages',label:'Messaggi'},{id:'payments',label:'Pagamenti'},{id:'helpers',label:'Aiutanti'});document.getElementById('content').innerHTML=nav(tabs);try{await baseLists()}catch(e){}({dashboard,customers,properties,checks,tasks,route,messages,payments,helpers}[S.tab]||dashboard)()}
function opts(){return S.customers.map(c=>`<option value="${c.id}">${esc(c.name)}${c.payment_valid?'':' · sospeso'}</option>`).join('')}
async function dashboard(){const s=await api('/api/admin/summary');document.getElementById('panel').innerHTML=`<div class="grid"><div class="card"><div class="muted">Clienti</div><div class="stat">${s.customers}</div></div><div class="card"><div class="muted">Immobili</div><div class="stat">${s.properties}</div></div><div class="card"><div class="muted">Controlli da fare</div><div class="stat">${s.dueChecks}</div></div><div class="card"><div class="muted">Sospesi pagamento</div><div class="stat">${s.blockedChecks}</div></div><div class="card"><div class="muted">Cose da fare</div><div class="stat">${s.todoTasks}</div></div>${S.user.role==='admin'?`<div class="card"><div class="muted">Extra da incassare</div><div class="stat">${s.pendingExtraPayments}</div></div>`:''}</div>${S.user.role==='helper'?note('Accesso aiutante: non visualizzi importi, incassi, pagamenti o guadagni.','success'):''}`}
async function customers(){let add=S.user.role==='admin'?`<div class="col4"><div class="card"><h3>Nuovo cliente</h3><form id="customerForm"><label>Nome</label><input name="name" required><label>Email</label><input name="email" type="email"><label>Telefono</label><input name="phone"><label>Note</label><textarea name="notes"></textarea><button class="btn">Salva</button></form></div><div class="card"><h3>Pagamento manuale</h3><form id="manualPay"><label>Cliente</label><select name="customer_id">${opts()}</select><label>Importo</label><input name="amount_euro"><label>Pagato fino al</label><input name="paid_until" type="date" required><label>Metodo</label><select name="method"><option>contanti</option><option>bonifico</option><option>assegno</option><option>altro</option></select><button class="btn green">Segna pagato</button></form></div></div>`:'';document.getElementById('panel').innerHTML=`<div class="row">${add}<div class="${S.user.role==='admin'?'col8':'col12'}"><div class="card"><h3>Clienti</h3><table><thead><tr><th>Cliente</th><th>Contatto</th><th>Stato</th><th>Immobili</th><th></th></tr></thead><tbody>${S.customers.map(c=>`<tr><td><b>${esc(c.name)}</b><br><span class="muted">${esc(c.notes)}</span></td><td>${esc(c.email)}<br>${esc(c.phone)}</td><td>${c.payment_valid===undefined?'operativo':`<span class="badge ${c.payment_valid?'ok':'bad'}">${c.payment_valid?'regolare':'sospeso'}</span>`}</td><td>${c.properties_count||0}</td><td>${S.user.role==='admin'?`<button class="btn small red" onclick="removeCustomer('${c.id}','${esc(c.name).replace(/'/g,"\\'")}')">Elimina</button>`:''}</td></tr>`).join('')}</tbody></table></div></div></div>`;if(S.user.role==='admin'){document.getElementById('customerForm').onsubmit=async e=>{e.preventDefault();try{await api('/api/admin/customers',{method:'POST',body:JSON.stringify(Object.fromEntries(new FormData(e.target)))});adminApp()}catch(x){alert(x.message)}};document.getElementById('manualPay').onsubmit=async e=>{e.preventDefault();const f=Object.fromEntries(new FormData(e.target));try{await api(`/api/admin/customers/${f.customer_id}/manual-payment`,{method:'POST',body:JSON.stringify(f)});alert('Pagamento registrato');adminApp()}catch(x){alert(x.message)}}}}
async function removeCustomer(id,name){if(!confirm('Attenzione: questa operazione rimuove definitivamente cliente, account, immobili e dati collegati. Continuare?'))return;const c1=prompt('Prima conferma: scrivi ELIMINA');if(c1!=='ELIMINA')return alert('Conferma 1 non corretta');const c2=prompt('Seconda conferma: scrivi esattamente il nome cliente:\n'+name);if(c2!==name)return alert('Conferma 2 non corretta');const c3=prompt('Terza conferma: scrivi CONFERMO');if(c3!=='CONFERMO')return alert('Conferma 3 non corretta');try{await api(`/api/admin/customers/${id}/remove-final`,{method:'POST',body:JSON.stringify({confirm1:c1,confirm2:c2,confirm3:c3})});alert('Cliente rimosso definitivamente');adminApp()}catch(e){alert(e.message)}}
async function properties(){let form=S.user.role==='admin'?`<div class="col4"><div class="card"><h3>Nuovo immobile</h3><form id="propForm"><label>Cliente</label><select name="customer_id">${opts()}</select><label>Nome immobile</label><input name="name" required><label>Indirizzo</label><input name="address"><label>Città</label><input name="city" value="Badesi"><label>Servizio</label><select name="package_type">${Object.keys(pkg).map(k=>`<option value="${k}">${pkg[k]}</option>`).join('')}</select><label>Latitudine</label><input name="latitude" id="lat"><label>Longitudine</label><input name="longitude" id="lng"><button type="button" class="btn light" onclick="fillGps()">Usa GPS</button> <button class="btn">Salva</button></form></div></div>`:'';document.getElementById('panel').innerHTML=`<div class="row">${form}<div class="${S.user.role==='admin'?'col8':'col12'}"><div class="card"><h3>Immobili</h3><table><thead><tr><th>Immobile</th><th>Cliente</th><th>Servizio</th><th>Richiesta</th><th>GPS</th><th>Azioni</th></tr></thead><tbody>${S.properties.map(p=>`<tr><td><b>${esc(p.name)}</b><br>${esc(p.address)} ${esc(p.city)}<br><span class="muted">${esc(p.client_notes||p.notes||'')}</span></td><td>${esc(p.customer_name)}<br>${p.payment_valid!==undefined?`<span class="badge ${p.payment_valid?'ok':'bad'}">${p.payment_valid?'eseguibile':'sospeso'}</span>`:''}</td><td>${pkg[p.package_type]||p.package_type}${p.monthly_price_cents?'<br>'+money(p.monthly_price_cents):''}</td><td><span class="badge ${p.request_status==='pending'?'warn':'ok'}">${p.request_status||'active'}</span></td><td>${p.latitude&&p.longitude?`📍 ${p.latitude}, ${p.longitude}<br><a target="_blank" href="https://www.google.com/maps?q=${p.latitude},${p.longitude}">Maps</a>`:'Non salvato'}</td><td><button class="btn small teal" onclick="gpsProp('${p.id}')">Salva GPS</button>${S.user.role==='admin'&&p.request_status==='pending'?` <button class="btn small green" onclick="approveProp('${p.id}')">Approva</button>`:''}</td></tr>`).join('')}</tbody></table></div></div></div>`;if(S.user.role==='admin')document.getElementById('propForm').onsubmit=async e=>{e.preventDefault();try{await api('/api/admin/properties',{method:'POST',body:JSON.stringify(Object.fromEntries(new FormData(e.target)))});adminApp()}catch(x){alert(x.message)}}}
function fillGps(){navigator.geolocation.getCurrentPosition(p=>{document.getElementById('lat').value=p.coords.latitude.toFixed(7);document.getElementById('lng').value=p.coords.longitude.toFixed(7)},e=>alert(e.message),{enableHighAccuracy:true})}function gpsProp(id){navigator.geolocation.getCurrentPosition(async p=>{try{await api(`/api/admin/properties/${id}/location`,{method:'POST',body:JSON.stringify({latitude:p.coords.latitude,longitude:p.coords.longitude})});adminApp()}catch(x){alert(x.message)}},e=>alert(e.message),{enableHighAccuracy:true})}async function approveProp(id){try{await api(`/api/admin/properties/${id}/approve`,{method:'POST',body:JSON.stringify({})});alert('Richiesta approvata');adminApp()}catch(e){alert(e.message)}}
async function checks(){const r=await api('/api/admin/due-checks');document.getElementById('panel').innerHTML=`<div class="card"><h3>Controlli da fare</h3><div id="complete"></div><table><thead><tr><th>Immobile</th><th>Cliente</th><th>Servizio</th><th>Stato</th><th></th></tr></thead><tbody>${r.checks.map(p=>`<tr><td><b>${esc(p.name)}</b><br>${esc(p.address)}</td><td>${esc(p.customer_name)}<br>${esc(p.customer_phone)}</td><td>${pkg[p.package_type]}</td><td>${p.blocked?'<span class="badge bad">sospeso</span>':'<span class="badge ok">eseguibile</span>'}</td><td>${p.blocked?'':`<button class="btn small green" onclick="complete('${p.id}','${p.package_type}')">Completa</button>`}</td></tr>`).join('')}</tbody></table></div>`}
function complete(id,type){const list=S.config?.checklists?.[type]||[];document.getElementById('complete').innerHTML=`<div class="notice"><form id="compForm"><input type="hidden" name="property_id" value="${id}">${list.map(x=>`<label><input type="checkbox" name="ck" value="${esc(x)}" checked style="width:auto"> ${esc(x)}</label>`).join('')}<label>Note</label><textarea name="notes"></textarea><label>Foto</label><input name="photos" type="file" multiple accept="image/*"><br><br><button class="btn green">Salva controllo</button></form></div>`;document.getElementById('compForm').onsubmit=async e=>{e.preventDefault();const fd=new FormData(e.target),cks=[...e.target.querySelectorAll('input[name=ck]:checked')].map(i=>i.value);fd.delete('ck');fd.append('checklist_json',JSON.stringify(cks));try{await api('/api/admin/checks/complete',{method:'POST',body:fd});alert('Controllo completato');adminApp()}catch(x){alert(x.message)}}}
async function tasks(){const r=await api('/api/admin/tasks');document.getElementById('panel').innerHTML=`<div class="row"><div class="col4"><div class="card"><h3>Nuova cosa da fare</h3><form id="taskForm"><label>Titolo</label><input name="title" required><label>Descrizione</label><textarea name="description"></textarea><label>Tipo</label><select name="type"><option>controllo</option><option>manutenzione</option><option>preventivo</option><option>pagamento</option><option>altro</option></select><label>Priorità</label><select name="priority"><option>normale</option><option>alta</option><option>bassa</option></select><label>Scadenza</label><input name="due_date" type="date"><button class="btn">Aggiungi</button></form></div></div><div class="col8"><div class="card"><h3>Lista</h3><table><tbody>${r.tasks.map(t=>`<tr><td><b>${esc(t.title)}</b><br>${esc(t.description)}</td><td>${esc(t.customer_name)}<br>${esc(t.property_name)}</td><td>${t.due_date||''}</td><td><button class="btn small green" onclick="doneTask('${t.id}')">Fatto</button></td></tr>`).join('')}</tbody></table></div></div></div>`;document.getElementById('taskForm').onsubmit=async e=>{e.preventDefault();try{await api('/api/admin/tasks',{method:'POST',body:JSON.stringify(Object.fromEntries(new FormData(e.target)))});adminApp()}catch(x){alert(x.message)}}}
async function doneTask(id){await api(`/api/admin/tasks/${id}/done`,{method:'POST',body:'{}'});adminApp()}
async function route(){document.getElementById('panel').innerHTML=`<div class="card"><h3>Organizza giro</h3><p class="muted">Ordina le case da controllare in base alla tua posizione.</p><button class="btn teal" onclick="loadRoute()">Calcola giro con GPS</button><div id="routeRes"></div></div>`}function loadRoute(){navigator.geolocation.getCurrentPosition(async p=>{try{const r=await api(`/api/admin/route-plan?lat=${p.coords.latitude}&lng=${p.coords.longitude}`);document.getElementById('routeRes').innerHTML=`<h3>${r.totalKm} km stimati</h3><table><tbody>${r.properties.map((x,i)=>`<tr><td>${i+1}</td><td><b>${esc(x.name)}</b><br>${esc(x.customer_name)}</td><td>${x.distance_from_previous_km} km</td><td><a target="_blank" href="https://www.google.com/maps?q=${x.latitude},${x.longitude}">Maps</a></td></tr>`).join('')}</tbody></table>`}catch(x){alert(x.message)}},e=>alert(e.message),{enableHighAccuracy:true})}
async function payments(){const[ex,mp]=await Promise.all([api('/api/admin/extra-payments'),api('/api/admin/manual-payments')]);document.getElementById('panel').innerHTML=`<div class="row"><div class="col4"><div class="card"><h3>Pagamento extra</h3><form id="extraForm"><label>Cliente</label><select name="customer_id">${opts()}</select><label>Importo</label><input name="amount_euro" required><label>Descrizione</label><textarea name="description" required></textarea><button class="btn gold">Crea pagamento</button></form></div></div><div class="col8"><div class="card"><h3>Extra</h3><table><tbody>${ex.payments.map(p=>`<tr><td>${esc(p.customer_name)}</td><td>${esc(p.description)}</td><td>${money(p.amount_cents)}</td><td>${p.status}</td></tr>`).join('')}</tbody></table></div><div class="card"><h3>Pagamenti manuali</h3><table><tbody>${mp.payments.map(p=>`<tr><td>${esc(p.customer_name)}</td><td>${p.amount_cents?money(p.amount_cents):'-'}</td><td>${esc(p.method)}</td><td>${p.paid_until||''}</td></tr>`).join('')}</tbody></table></div></div></div>`;document.getElementById('extraForm').onsubmit=async e=>{e.preventDefault();try{await api('/api/admin/extra-payments',{method:'POST',body:JSON.stringify(Object.fromEntries(new FormData(e.target)))});adminApp()}catch(x){alert(x.message)}}}
async function helpers(){const r=await api('/api/admin/helpers');document.getElementById('panel').innerHTML=`<div class="row"><div class="col4"><div class="card"><h3>Nuovo aiutante</h3><form id="helperForm"><label>Nome</label><input name="name" required><label>Email</label><input name="email" type="email" required><label>Telefono</label><input name="phone"><label>Password</label><input name="password" type="password" minlength="8" required><button class="btn">Crea aiutante</button></form></div></div><div class="col8"><div class="card"><h3>Aiutanti</h3>${note('Gli aiutanti non vedono importi, incassi, Stripe o pagamenti.','success')}<table><tbody>${r.helpers.map(h=>`<tr><td><b>${esc(h.name)}</b><br>${esc(h.email)}</td><td>${esc(h.phone)}</td><td>${h.email_confirmed?'attivo':'da confermare'}</td></tr>`).join('')}</tbody></table></div></div></div>`;document.getElementById('helperForm').onsubmit=async e=>{e.preventDefault();try{await api('/api/admin/helpers',{method:'POST',body:JSON.stringify(Object.fromEntries(new FormData(e.target)))});adminApp()}catch(x){alert(x.message)}}}
async function messages(){const r=await api('/api/admin/messages');document.getElementById('panel').innerHTML=`<div class="row"><div class="col4"><div class="card"><h3>Scrivi al cliente</h3><form id="admMsg"><label>Cliente</label><select name="customer_id">${opts()}</select><label>Messaggio</label><textarea name="body" required></textarea><button class="btn">Invia come Home Care</button></form></div></div><div class="col8"><div class="card"><h3>Messaggi recenti</h3><div class="chat">${r.messages.reverse().map(m=>`<div class="msg ${m.sender_role==='admin'?'home':'me'}"><b>${m.sender_role==='admin'?'Home Care':esc(m.customer_name)}</b><br>${esc(m.body)}<br><small>${new Date(m.created_at).toLocaleString('it-IT')}</small></div>`).join('')}</div></div></div></div>`;document.getElementById('admMsg').onsubmit=async e=>{e.preventDefault();try{await api('/api/admin/messages',{method:'POST',body:JSON.stringify(Object.fromEntries(new FormData(e.target)))});messages()}catch(x){alert(x.message)}}}
async function clientDash(){document.getElementById('content').innerHTML='<div id="clientPanel">Caricamento...</div>';try{const r=await api('/api/client/dashboard');document.getElementById('clientPanel').innerHTML=`<div class="grid"><div class="card"><h3>Stato</h3><span class="badge ${r.customer?.payment_valid?'ok':'bad'}">${r.customer?.payment_valid?'Pagamento regolare':'Pagamento non regolare'}</span><p class="muted">Dopo l’approvazione dell’immobile potrai vedere controlli, report e pagamenti.</p></div><div class="card"><h3>Azioni rapide</h3><button class="btn gold" onclick="document.getElementById('requestBox').scrollIntoView({behavior:'smooth'})">Aggiungi immobile</button> <button class="btn light" onclick="loadClientMessages()">Chat Home Care</button></div></div><div class="sectionTitle"><h2>Scegli un servizio</h2></div>${planCards()}<div id="requestBox" class="card"><h2>Aggiungi immobile da affidare a Home Care</h2><form id="clientProp"><label>Nome immobile</label><input name="name" required placeholder="Casa al mare, Villetta, Appartamento"><label>Indirizzo completo</label><input name="address" required><div class="row"><div class="col6"><label>Comune</label><input name="city" value="Badesi"></div><div class="col6"><label>Zona / località</label><input name="zone"></div></div><label>Tipo immobile</label><select name="property_type"><option>Appartamento</option><option>Villetta</option><option>Villa con giardino</option><option>Altro</option></select><label>Servizio richiesto</label><select name="package_type">${Object.keys(pkg).map(k=>`<option value="${k}">${pkg[k]} - ${prices[k]}</option>`).join('')}</select><label>Note utili per raggiungere la casa</label><textarea name="notes"></textarea><button class="btn teal">Invia richiesta a Home Care</button></form><div id="propMsg"></div></div><div class="card"><h2>I miei immobili</h2>${r.properties.length?`<table><thead><tr><th>Immobile</th><th>Indirizzo</th><th>Servizio</th><th>Stato</th></tr></thead><tbody>${r.properties.map(p=>`<tr><td><b>${esc(p.name)}</b></td><td>${esc(p.address)}<br>${esc(p.city)}</td><td>${pkg[p.package_type]||p.package_type}</td><td><span class="badge ${p.request_status==='pending'?'warn':p.active?'ok':'bad'}">${p.request_status==='pending'?'In attesa di verifica':p.active?'Attivo':'Non attivo'}</span></td></tr>`).join('')}</tbody></table>`:'<p>Nessun immobile inserito.</p>'}</div><div class="card"><h2>Chat Home Care</h2><div id="clientChat"></div></div><div class="card"><h2>Report recenti</h2>${r.reports.map(rep=>`<div class="notice"><b>${esc(rep.property_name)}</b><p>${esc(rep.notes)}</p><div class="photos">${(rep.photo_urls||[]).map(u=>`<img src="${u}">`).join('')}</div></div>`).join('')||'<p>Nessun report.</p>'}</div>`;document.getElementById('clientProp').onsubmit=async e=>{e.preventDefault();const box=document.getElementById('propMsg');try{await api('/api/client/properties',{method:'POST',body:JSON.stringify(Object.fromEntries(new FormData(e.target)))});box.innerHTML=note('Richiesta inviata. Home Care controllerà i dati e ti risponderà.','success');e.target.reset();setTimeout(clientDash,800)}catch(x){box.innerHTML=note(x.message,'error')}};loadClientMessages()}catch(e){document.getElementById('clientPanel').innerHTML=note(e.message,'error')}}async function loadClientMessages(){try{const r=await api('/api/client/messages');document.getElementById('clientChat').innerHTML=`<div class="chat">${r.messages.map(m=>`<div class="msg ${m.sender_role==='client'?'me':'home'}"><b>${m.sender_role==='client'?'Tu':'Home Care'}</b><br>${esc(m.body)}<br><small>${new Date(m.created_at).toLocaleString('it-IT')}</small></div>`).join('')}</div><form id="clientMsg" style="margin-top:10px"><textarea name="body" required placeholder="Scrivi a Home Care..."></textarea><button class="btn">Invia messaggio</button></form>`;document.getElementById('clientMsg').onsubmit=async e=>{e.preventDefault();try{await api('/api/client/messages',{method:'POST',body:JSON.stringify(Object.fromEntries(new FormData(e.target)))});loadClientMessages()}catch(x){alert(x.message)}}}catch(e){document.getElementById('clientChat').innerHTML=note(e.message,'error')}}
if('serviceWorker'in navigator)navigator.serviceWorker.register('/sw.js').catch(()=>{});boot();
</script></body></html>
