<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Home Care offline</title>
  <style>
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:#f5f1e8;color:#06243a;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;padding:24px}
    .card{max-width:520px;background:#fffdf7;border:1px solid #e1d6c8;border-radius:28px;padding:32px;text-align:center;box-shadow:0 20px 60px rgba(6,36,58,.16)}
    .logo{font-size:34px;font-weight:900}.logo span{color:#c7952d}.btn{display:inline-block;margin-top:18px;padding:13px 22px;background:#06243a;color:white;text-decoration:none;border-radius:14px;font-weight:900}
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">Home <span>Care</span></div>
    <h1>Sei offline</h1>
    <p>Controlla la connessione e riapri Home Care. Alcune schermate già caricate potrebbero essere disponibili offline.</p>
    <a class="btn" href="/">Riprova</a>
  </div>
</body>
</html>
