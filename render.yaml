services:
  - type: web
    name: home-care-pwa
    runtime: node
    region: frankfurt
    plan: starter
    buildCommand: npm ci --ignore-scripts && npm run check
    preDeployCommand: npm run predeploy
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: home-care-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_NAME
        value: Admin Home Care
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: RESET_ADMIN_PASSWORD
        value: "false"
      - key: REGISTRATION_ENABLED
        value: "true"
      - key: BREVO_SENDER_NAME
        value: Home Care

databases:
  - name: home-care-db
    region: frankfurt
    plan: basic-256mb
    databaseName: homecare
    user: homecare
