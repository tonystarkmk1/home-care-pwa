services:
  - type: web
    name: home-care-pwa
    runtime: node
    region: frankfurt
    plan: starter
    buildCommand: npm install && npm run check
    preDeployCommand: npm run predeploy
    startCommand: node scripts/generate-pwa-png-icons.js && node scripts/patch-install-button-only.js && node scripts/start-stable.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: home-care-db
          property: connectionString
      - key: ADMIN_NAME
        value: Admin Home Care
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: APP_WHATSAPP
        value: "80872207"
      - key: BREVO_SENDER_NAME
        value: Home Care
      - key: UPLOAD_DIR
        value: uploads

databases:
  - name: home-care-db
    region: frankfurt
    plan: basic-256mb
    databaseName: homecare
    user: homecare
